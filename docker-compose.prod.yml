# Produktions-Compose für employees.aicoreinfra.de
# - app: Next.js + faster-whisper, NUR an 127.0.0.1 gebunden; der Host-nginx (TLS) proxyt hierher.
# - db:  dedizierter Postgres (isoliert vom geteilten Host-Postgres).
# Secrets/Config kommen aus ./.env (gitignored, server-seitig gepflegt) — siehe .env.production.example.
services:
  app:
    build: .
    container_name: baudoku_app
    env_file:
      - ./.env
    environment:
      # DATABASE_URL zeigt auf den db-Service (überschreibt einen evtl. .env-Wert)
      - DATABASE_URL=postgresql://baudoku:${POSTGRES_PASSWORD}@db:5432/baudoku?schema=public
      - HF_HOME=/app/.cache/huggingface
      - WHISPER_VENV=/app/.venv-whisper
      # Auth.js hinter Reverse-Proxy
      - AUTH_TRUST_HOST=true
    ports:
      # Nur Loopback — öffentlich erreichbar ausschließlich über den Host-nginx.
      - "127.0.0.1:3012:3000"
    volumes:
      - storage:/app/storage
      - whisper_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  db:
    image: postgres:16
    container_name: baudoku_db
    environment:
      - POSTGRES_USER=baudoku
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=baudoku
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baudoku"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  storage:
  pgdata:
  whisper_cache:
