name: Deploy to production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

# Keine zwei Deploys gleichzeitig; einen laufenden Deploy nicht abbrechen.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + compose up (self-hosted)
    # Läuft auf dem self-hosted Runner direkt auf dem Server (deploy@72.62.42.27).
    # Kein SSH nötig → unabhängig von der ufw-Firewall, die GitHub-hosted Runner blockt.
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Deploy (git reset + docker compose up --build)
        run: |
          set -euo pipefail
          cd /home/deploy/ai_coworker_construction
          git fetch --prune origin main
          git reset --hard origin/main
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -f docker-compose.prod.yml ps

      - name: Smoke test (/ready über nginx/TLS — App + DB erreichbar)
        run: |
          set -euo pipefail
          for attempt in $(seq 1 15); do
            if curl -fsS --max-time 10 https://employees.aicoreinfra.de/ready | grep -q '"status":"ready"'; then
              echo "ready"
              exit 0
            fi
            echo "attempt $attempt: noch nicht bereit, warte..."
            sleep 8
          done
          echo "Smoke-Test fehlgeschlagen: /ready lieferte nicht status=ready" >&2
          exit 1

      - name: Inngest sync (App bei Inngest Cloud re-registrieren)
        # Registriert die Funktionen nach jedem Deploy neu (sonst kann die Registrierung
        # veralten und Events lösen keine Jobs mehr aus → Transkription/PDF bleiben hängen).
        run: curl -fsS -X PUT https://employees.aicoreinfra.de/api/inngest
